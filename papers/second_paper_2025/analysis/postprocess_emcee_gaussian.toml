# Config for postprocess_emcee.py
# Keep input/output paths on CLI; put analysis behavior here.

[analysis]

autocorr = true
# If true, only inspect input files and exit without plotting.
inspect = false

# Standard postprocessing controls.
burn = 100
thin = 1

# Optional corner plot settings.
# Set to a list of values matching chain parameter order, or leave empty to use built-in fiducials.
truths = []
# title = "Run title"

# Optional subset of parameters to show in corner plot (others marginalized).
params = ["omega_m", "s8"]

# GetDist smoothing controls (reduce values for sharper distributions, increase for smoother)
# Default 0.6 gives crisp distributions; use 1.0 for GetDist default smoothing
smooth_scale_1D = 1.5   # Smoothing for 1D marginal distributions
smooth_scale_2D = 1.5   # Smoothing for 2D contours

# GetDist corner plot figure size (optional)
# If not specified, GetDist auto-scales based on number of parameters.
corner_fig_size = 6          # Square figure: 8 inches × 8 inches
# corner_fig_size = [10, 8]    # Rectangular: 10 inches wide, 8 inches tall

# Optional plotting labels (e.g., LaTeX) by parameter name.
# These are used in corner/trace/scatter axes.
# [analysis.param_labels]
# s8 = "$S_8$"
# w_c = "$\\omega_c$"
# h = "$h$"
# omega_m = "$\\Omega_m$"



[stuck_filter]
# Remove middle segments where all walkers collapse to one value.
enabled = true

# A step is "stuck" if walker spread <= atol + rtol * scale
atol = 0.0
rtol = 1e-12

# Only remove consecutive stuck runs of at least this many steps.
min_run = 2

# Extra steps removed before/after each detected stuck segment.
# Use pre_padding to catch the onset spike where the collapse begins.
pre_padding = 5
post_padding = 25

# Also remove steps where all selected parameters are ~0 for all walkers,
# even if they are not part of a long stuck run.
remove_all_zero_steps = true
zero_tol = 0.0

# Also remove isolated one-step global dips where all selected parameters
# simultaneously collapse near zero relative to their typical scale.
remove_isolated_global_drops = true
global_drop_rel = 0.02

# Optional subset of parameters used for stuck detection.
# params = ["s8", "w_c"]
